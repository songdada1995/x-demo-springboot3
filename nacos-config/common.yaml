# ============================================
# 公共配置 - 导入到 Nacos DataId: common, Group: DEFAULT_GROUP
# ============================================
# 使用 hosts 文件解析域名，需在 hosts 中配置：
#   x-nacos.com   x-mysql.com   x-redis.com   x-sentinel.com   x-gateway.com
# 环境变量可覆盖：DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD, REDIS_PORT, REDIS_PASSWORD, JWT_SECRET
# ============================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://x-mysql.com:${DB_PORT:3306}/${DB_NAME:x_demo}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: x-redis.com
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: x-nacos.com:8848
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: x-nacos.com:8848
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: x-sentinel.com:8080
      eager: true

# JWT - 生产环境必须通过 JWT_SECRET 环境变量覆盖
jwt:
  secret: ${JWT_SECRET:your-secret-key-please-change-in-production}
  expiration: 86400000

# 日志
logging:
  level:
    root: INFO
