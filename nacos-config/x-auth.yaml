# ============================================
# 认证服务配置 - 导入到 Nacos DataId: x-auth, Group: DEFAULT_GROUP
# ============================================

server:
  port: 9002

spring:
  cloud:
    sentinel:
      scg:
        fallback:
          mode: response
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: full
      compression:
        request:
          enabled: true
        response:
          enabled: true
      httpclient:
        enabled: true
        max-connections: 200
        max-connections-per-route: 50
        time-to-live: 900
        time-to-live-unit: seconds
        follow-redirects: true
        disable-ssl-validation: false
        connection-timeout: 2000
        connection-timer-repeat: 3000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://x-gateway.com:9001

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.auth.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

auth:
  server:
    issuer: http://x-gateway.com:9001
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
    allowed-redirect-uris:
      - http://localhost:3000/login/oauth2/code/client
      - http://localhost:8080/login/oauth2/code/client
    token-endpoint: /oauth2/token
    authorization-endpoint: /oauth2/authorize
    user-info-endpoint: /userinfo
    jwk-set-endpoint: /.well-known/jwks.json
    logout-endpoint: /logout

logging:
  level:
    org.springframework.security: ${LOG_LEVEL:INFO}
    org.springframework.security.oauth2: ${LOG_LEVEL:INFO}
    com.example.auth: ${LOG_LEVEL:INFO}
