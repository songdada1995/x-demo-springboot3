server:
  port: 9001

spring:
  application:
    name: x-gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
  config:
    import:
      - "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension:yaml}"
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: x-auth
          uri: lb://x-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: x-upms-biz
          uri: lb://x-upms-biz
          predicates:
            - Path=/upms/**
          filters:
            - StripPrefix=1
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.247.129:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.247.129:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD_ADDR:192.168.247.129:8080}
      eager: true
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"msg":"服务繁忙，请稍后重试"}'

# JWT配置 - 需要与认证服务保持一致
jwt:
  secret: ${JWT_SECRET:your-secret-key-please-change-in-production}
  expiration: 86400000
